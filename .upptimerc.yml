owner: Western-Formula-Racing
repo: daq-uptime

sites:
  - name: Data Downloader API
    url: https://api.westernformularacing.org/api/health
    headers:
      - "X-WFR-Status-Token: $UPTIME_MONITOR_TOKEN"
  - name: TimescaleDB
    url: https://api.westernformularacing.org/api/health-status
    headers:
      - "X-WFR-Status-Token: $UPTIME_MONITOR_TOKEN"
  - name: Data Uploader
    url: https://uploader.westernformularacing.org/health
    headers:
      - "X-WFR-Status-Token: $UPTIME_MONITOR_TOKEN"
  - name: Code-Server
    url: https://vscode.westernformularacing.org/
    headers:
      - "X-WFR-Status-Token: $UPTIME_MONITOR_TOKEN"

status-website:
  baseUrl: /daq-uptime
  logoUrl: https://raw.githubusercontent.com/Western-Formula-Racing/wfrwebsite/main/src/Assets/Subsystems/WFR_DAQ_Logo.png
  name: WFR DAQ Status
  introTitle: "**WFR DAQ Status** is the real-time health monitor for Western Formula Racing's data infrastructure."
  introMessage: This page monitors our telemetry pipeline, database, and development tools. It is powered by GitHub Actions and operates independently of our main server.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
